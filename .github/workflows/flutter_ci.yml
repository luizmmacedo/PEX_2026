name: Flutter CI

on:
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Instalar dependências
        run: flutter pub get

      - name: Análise estática (lint)
        run: flutter analyze

      - name: Rodar testes
        run: flutter test